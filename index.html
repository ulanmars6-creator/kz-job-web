        // API 端点配置
        const API_BASE = '/api';
        const JOBS_API = API_BASE + '/jobs';
        const SEEKS_API = API_BASE + '/seeks';
        const PROFILE_API = API_BASE + '/profile';
        const AUTH_API_ENDPOINT = API_BASE;

        // 简单邮箱登录实现（前端）：
        // - sendVerification(email): 如果配置了 AUTH_API_ENDPOINT 则请求后端发送邮箱验证码，否则在本地生成并保存验证码
        // - verifyCode(email, code): 校验本地保存或依赖后端响应
        function isValidEmail(email){
            return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email);
        }

        function saveAuthCode(email, code){
            const expires = Date.now() + 15*60*1000; // 15 分钟有效期
            localStorage.setItem('auth_code_' + email, JSON.stringify({code, expires}));
        }

        function loadAuthCode(email){
            try{ return JSON.parse(localStorage.getItem('auth_code_' + email)); }catch(e){return null}
        }

        async function sendVerification(email){
            if(!isValidEmail(email)){
                alert('请输入有效邮箱地址');
                return null;
            }
            if(AUTH_API_ENDPOINT){
                try{
                    const r = await fetch(AUTH_API_ENDPOINT + '/send-code', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})});
                    const body = await r.json().catch(()=>null);
                    if(r.ok){
                        // 如果后端返回 devCode（开发模式），一并展示以便联调
                        if(body && body.devCode){
                            alert(translations[localStorage.getItem('siteLang')||'zh'].login_sent_notice + '\n开发验证码：' + body.devCode);
                        } else {
                            alert(translations[localStorage.getItem('siteLang')||'zh'].login_sent_notice);
                        }
                        return true;
                    } else {
                        console.error('auth send failed', body || await r.text());
                        alert('发送验证码失败');
                        return false;
                    }
                } catch(e){ console.error(e); alert('发送验证码失败'); return false; }
            } else {
                // dev mode: 生成本地验证码并显示
                const code = String(Math.floor(100000 + Math.random()*900000));
                saveAuthCode(email, code);
                alert((translations[localStorage.getItem('siteLang')||'zh'].login_sent_notice) + '\n开发验证码：' + code);
                return true;
            }
        }

        function verifyCodeLocal(email, code){
            const rec = loadAuthCode(email);
            if(!rec) return false;
            if(Date.now() > rec.expires) return false;
            return String(rec.code) === String(code).trim();
        }

        async function verifyCode(email, code){
            if(AUTH_API_ENDPOINT){
                try{
                    const r = await fetch(AUTH_API_ENDPOINT + '/verify', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, code})});
                    return r.ok;
                } catch(e){ console.error(e); return false; }
            } else {
                return verifyCodeLocal(email, code);
            }
        }

        function setLoggedIn(email){
            localStorage.setItem('userEmail', email);
            renderAuthState();
        }

        function logout(){
            localStorage.removeItem('userEmail');
            renderAuthState();
        }

        function renderAuthState(){
            const area = document.getElementById('auth-area');
            const user = localStorage.getItem('userEmail');
            const lang = localStorage.getItem('siteLang') || 'zh';
            if(!area) return;
            if(user){
                area.innerHTML = `
                    <div id="user-menu" class="relative">
                        <button id="btn-user" class="btn-apple px-4 py-1 rounded-full text-xs flex items-center gap-2">
                            <span>${escapeHtml(user.split('@')[0])}</span>
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border hidden z-50">
                            <a href="#" id="btn-profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-i18n="profile">个人资料</a>
                            <a href="#" id="btn-logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-i18n="logout">退出登录</a>
                        </div>
                    </div>
                `;
                // 添加下拉菜单事件
                const btnUser = document.getElementById('btn-user');
                const dropdown = document.getElementById('user-dropdown');
                btnUser?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('hidden');
                });
                document.addEventListener('click', () => dropdown.classList.add('hidden'));
                document.getElementById('btn-profile')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.add('hidden');
                    openProfileModal();
                });
                document.getElementById('btn-logout')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.add('hidden');
                    logout();
                });
            } else {
                area.innerHTML = `<button id="btn-login" class="btn-apple px-4 py-1 rounded-full text-xs" data-i18n="login">登录</button>`;
                document.getElementById('btn-login')?.addEventListener('click', openLoginModal);
            }
        }

        function openLoginModal(){
            if(document.getElementById('login-modal')) return;
            const wrapper = document.createElement('div');
            wrapper.id = 'login-modal';
            wrapper.className = 'fixed inset-0 z-70 flex items-center justify-center bg-black/40';
            wrapper.innerHTML = `
                <div class="bg-white rounded-xl w-full max-w-md p-6">
                    <h3 class="text-lg font-bold mb-4" data-i18n="login_modal_title">邮箱登录</h3>
                    <div class="grid gap-3">
                        <input id="login-email" class="border p-2 rounded" placeholder="邮箱地址" data-i18n="login_email">
                        <div class="flex gap-2">
                            <button id="login-send" class="flex-1 px-3 py-2 rounded border text-sm" data-i18n="login_send_code">发送验证码</button>
                            <input id="login-code" class="w-36 border p-2 rounded" placeholder="验证码" data-i18n="login_code_placeholder">
                        </div>
                    </div>
                    <div class="mt-4 flex justify-end space-x-2">
                        <button id="login-cancel" class="px-4 py-2 rounded border text-sm" onclick="document.getElementById('login-modal')?.remove()">取消</button>
                        <button id="login-verify" class="px-4 py-2 rounded bg-blue-600 text-white text-sm" data-i18n="login_verify">验证并登录</button>
                    </div>
                    <p id="login-note" class="text-xs text-gray-500 mt-3"></p>
                </div>
            `;
            document.body.appendChild(wrapper);
            applyLang(localStorage.getItem('siteLang') || 'zh');
            document.getElementById('login-send').addEventListener('click', async ()=>{
                const email = document.getElementById('login-email').value.trim();
                const ok = await sendVerification(email);
                if(ok) document.getElementById('login-note').textContent = translations[localStorage.getItem('siteLang')||'zh'].login_sent_notice;
            });
            document.getElementById('login-verify').addEventListener('click', async ()=>{
                const email = document.getElementById('login-email').value.trim();
                const code = document.getElementById('login-code').value.trim();
                const ok = await verifyCode(email, code);
                if(ok){
                    setLoggedIn(email);
                    document.getElementById('login-modal')?.remove();
                } else {
                    alert(translations[localStorage.getItem('siteLang')||'zh'].login_invalid_code);
                }
            });
        }

        function applyLang(lang){
            document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'kk';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const text = translations[lang][key];
                if(!text) return;
                const tag = el.tagName.toLowerCase();
                if(tag === 'input' || tag === 'textarea'){
                    el.placeholder = text;
                } else {
                    el.innerHTML = text.replace(/\n/g, '<br>');
                }
            });
            document.querySelectorAll('[data-lang]').forEach(img => {
                img.style.opacity = (img.dataset.lang === lang) ? '1' : '0.6';
            });
            localStorage.setItem('siteLang', lang);
            // 更新认证区文本（如果已登录/未登录需要刷新显示）
            if(typeof renderAuthState === 'function') renderAuthState();
        }

        // 职位管理
        const JOBS_KEY = 'jobs_v1';

        function loadJobs(){
            try{ return JSON.parse(localStorage.getItem(JOBS_KEY) || '[]'); }
            catch(e){ return []; }
        }

        function saveJobs(list){
            localStorage.setItem(JOBS_KEY, JSON.stringify(list));
        }

        async function renderJobsList(){
            let jobs = loadJobs();

            // 如果配置了 API，尝试从服务器获取
            if(JOBS_API){
                try{
                    const resp = await fetch(JOBS_API);
                    if(resp.ok){
                        const data = await resp.json();
                        jobs = data.jobs || [];
                        // 同步到本地存储
                        saveJobs(jobs);
                    }
                } catch(e){ console.log('Failed to load jobs from server, using local data'); }
            }

            const container = document.getElementById('jobs-list');
            const empty = document.getElementById('jobs-empty');
            const searchTerm = document.getElementById('job-search')?.value.toLowerCase() || '';
            const filterCity = document.getElementById('job-filter')?.value || '';

            // 过滤职位
            const filteredJobs = jobs.filter(job => {
                const matchesSearch = !searchTerm ||
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.description.toLowerCase().includes(searchTerm);
                const matchesCity = !filterCity || job.location.includes(filterCity);
                return matchesSearch && matchesCity;
            });

            container.innerHTML = '';
            if(!filteredJobs.length){ empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            filteredJobs.slice().reverse().forEach(job => {
                const el = document.createElement('div');
                el.className = 'group bg-white border border-gray-100 p-6 rounded-[20px] flex justify-between items-center hover:shadow-xl hover:border-transparent transition-all duration-300 cursor-pointer';
                el.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center font-bold text-gray-400">
                            ${escapeHtml(job.company.charAt(0).toUpperCase())}
                        </div>
                        <div>
                            <h3 class="text-lg font-bold group-hover:text-blue-600 transition-colors">${escapeHtml(job.title)}</h3>
                            <p class="text-sm text-gray-500">${escapeHtml(job.company)} · ${escapeHtml(job.location)}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-lg font-semibold text-[#1d1d1f]">${escapeHtml(job.salary || '面议')}</span>
                        <p class="text-xs text-gray-400 mt-1">${new Date(job.createdAt).toLocaleString()}</p>
                    </div>
                `;
                el.addEventListener('click', () => showJobDetails(job));
                container.appendChild(el);
            });
        }

        function showJobDetails(job){
            if(document.getElementById('job-detail-modal')) return;
            const wrapper = document.createElement('div');
            wrapper.id = 'job-detail-modal';
            wrapper.className = 'fixed inset-0 z-60 flex items-center justify-center bg-black/40';
            wrapper.innerHTML = `
                <div class="bg-white rounded-xl w-full max-w-2xl p-6 max-h-[80vh] overflow-y-auto">
                    <h3 class="text-xl font-bold mb-4">${escapeHtml(job.title)}</h3>
                    <div class="grid gap-3 mb-6">
                        <div><strong>公司：</strong>${escapeHtml(job.company)}</div>
                        <div><strong>地点：</strong>${escapeHtml(job.location)}</div>
                        <div><strong>薪资：</strong>${escapeHtml(job.salary || '面议')}</div>
                        <div><strong>联系方式：</strong>${escapeHtml(job.contact || '')}</div>
                        <div><strong>发布时间：</strong>${new Date(job.createdAt).toLocaleString()}</div>
                    </div>
                    <div class="mb-4">
                        <h4 class="font-bold mb-2">职位描述：</h4>
                        <p class="text-gray-700 whitespace-pre-line">${escapeHtml(job.description || '')}</p>
                    </div>
                    ${job.requirements ? `
                    <div class="mb-4">
                        <h4 class="font-bold mb-2">要求：</h4>
                        <p class="text-gray-700 whitespace-pre-line">${escapeHtml(job.requirements)}</p>
                    </div>
                    ` : ''}
                    <div class="flex justify-end space-x-2">
                        <button id="close-job-detail" class="px-4 py-2 rounded border text-sm">关闭</button>
                    </div>
                </div>
            `;
            document.body.appendChild(wrapper);
            document.getElementById('close-job-detail').addEventListener('click', () => wrapper.remove());
        }

        function openJobModal(){
            if(document.getElementById('job-modal')) return;
            const user = localStorage.getItem('userEmail');
            if(!user){
                alert('请先登录后再发布职位');
                openLoginModal();
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.id = 'job-modal';
            wrapper.className = 'fixed inset-0 z-60 flex items-center justify-center bg-black/40';
            wrapper.innerHTML = `
                <div class="bg-white rounded-xl w-full max-w-lg p-6">
                    <h3 class="text-lg font-bold mb-4" data-i18n="job_modal_title">发布招聘职位</h3>
                    <div class="grid gap-3">
                        <input class="border p-2 rounded" id="job-title" placeholder="职位名称" data-i18n="job_title">
                        <input class="border p-2 rounded" id="job-company" placeholder="公司名称" data-i18n="job_company">
                        <input class="border p-2 rounded" id="job-location" placeholder="工作地点" data-i18n="job_location">
                        <input class="border p-2 rounded" id="job-salary" placeholder="薪资范围" data-i18n="job_salary">
                        <input class="border p-2 rounded" id="job-contact" placeholder="联系方式" data-i18n="job_contact">
                        <textarea class="border p-2 rounded" id="job-description" rows="3" placeholder="职位描述" data-i18n="job_description"></textarea>
                        <textarea class="border p-2 rounded" id="job-requirements" rows="3" placeholder="职位要求" data-i18n="job_requirements"></textarea>
                        <label class="flex items-center gap-2 mt-2"><input type="checkbox" id="job-sync" class="w-4 h-4"> <span data-i18n="sync_label">同步到服务器</span></label>
                    </div>
                    <div class="mt-4 flex justify-end space-x-2">
                        <button id="job-cancel" class="px-4 py-2 rounded border text-sm" data-i18n="cancel">取消</button>
                        <button id="job-submit" class="px-4 py-2 rounded bg-blue-600 text-white text-sm" data-i18n="submit">发布</button>
                    </div>
                </div>
            `;
            document.body.appendChild(wrapper);
            applyLang(localStorage.getItem('siteLang') || 'zh');
            document.getElementById('job-cancel').addEventListener('click', () => wrapper.remove());
            document.getElementById('job-submit').addEventListener('click', submitJob);
        }

        async function submitJob(){
            const title = document.getElementById('job-title').value.trim();
            const company = document.getElementById('job-company').value.trim();
            const location = document.getElementById('job-location').value.trim();
            const salary = document.getElementById('job-salary').value.trim();
            const contact = document.getElementById('job-contact').value.trim();
            const description = document.getElementById('job-description').value.trim();
            const requirements = document.getElementById('job-requirements').value.trim();

            if(!title || !company || !location){
                alert('请填写职位名称、公司名称和工作地点');
                return;
            }

            const user = localStorage.getItem('userEmail');
            const job = {
                title, company, location, salary, contact, description, requirements,
                employerEmail: user,
                createdAt: Date.now()
            };

            // 保存到本地
            const jobs = loadJobs();
            jobs.push(job);
            saveJobs(jobs);

            // 如果选中同步，则同步到服务器
            const syncChecked = document.getElementById('job-sync')?.checked;
            if(syncChecked && JOBS_API){
                try{
                    const resp = await fetch(JOBS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(job)
                    });
                    if(resp.ok){
                        alert('职位已发布并同步到服务器');
                    } else {
                        console.error('sync failed', await resp.text());
                        alert('职位已保存到本地，但同步到服务器失败');
                    }
                } catch(err){
                    console.error('sync err', err);
                    alert('职位已保存到本地，但同步到服务器失败');
                }
            } else {
                alert('职位已发布');
            }

            document.getElementById('job-modal')?.remove();
            renderJobsList();
        }
        const SEEK_KEY = 'seekIntents_v1';

        function loadSeeks(){
            try{ return JSON.parse(localStorage.getItem(SEEK_KEY) || '[]'); }
            catch(e){ return []; }
        }

        function saveSeeks(list){
            localStorage.setItem(SEEK_KEY, JSON.stringify(list));
        }

        function renderSeekList(){
            const list = loadSeeks();
            const container = document.getElementById('seek-list');
            const empty = document.getElementById('seek-empty');
            container.innerHTML = '';
            if(!list.length){ empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            list.slice().reverse().forEach(item => {
                const el = document.createElement('div');
                el.className = 'bg-white border border-gray-100 p-4 rounded-lg cursor-pointer hover:shadow-md transition-shadow';
                el.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <div class="font-bold text-lg text-blue-600">${escapeHtml(item.position || '—')}</div>
                            <div class="text-sm text-gray-600 mt-1">${escapeHtml(item.city || '')} · ${escapeHtml(item.name || '')}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-gray-500">${new Date(item.time).toLocaleString()}</div>
                            <div class="mt-1 text-sm text-gray-800 font-semibold">${escapeHtml(item.salary || '')}</div>
                        </div>
                    </div>
                    <div class="details hidden mt-3 pt-3 border-t border-gray-100">
                        <div class="text-sm text-gray-700 mb-2"><strong>联系方式：</strong>${escapeHtml(item.contact || '')}</div>
                        <div class="text-sm text-gray-700"><strong>个人简介：</strong>${escapeHtml(item.summary || '')}</div>
                        <button class="mt-3 text-xs text-red-500" data-id="${item.id}">删除</button>
                    </div>
                `;
                el.addEventListener('click', (e) => {
                    // 如果点击的是删除按钮，不展开详情
                    if(e.target.tagName === 'BUTTON') return;
                    const details = el.querySelector('.details');
                    details.classList.toggle('hidden');
                });
                el.querySelector('button')?.addEventListener('click', e => {
                    e.stopPropagation();
                    const id = e.currentTarget.dataset.id;
                    deleteSeek(id);
                });
                container.appendChild(el);
            });
        }

        function deleteSeek(id){
            const list = loadSeeks().filter(i => String(i.id) !== String(id));
            saveSeeks(list);
            renderSeekList();
        }

        function escapeHtml(str){
            if(!str) return '';
            return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        }

        // 模态表单创建与控制
        function openSeekModal(){
            if(document.getElementById('seek-modal')) return;
            const wrapper = document.createElement('div');
            wrapper.id = 'seek-modal';
            wrapper.className = 'fixed inset-0 z-60 flex items-center justify-center bg-black/40';
            wrapper.innerHTML = `
                <div class="bg-white rounded-xl w-full max-w-lg p-6">
                    <h3 class="text-lg font-bold mb-4" data-i18n="seek_modal_title">发布求职意向</h3>
                    <div class="grid gap-3">
                        <input class="border p-2 rounded" id="seek-name" placeholder="姓名" data-i18n="seek_name">
                        <input class="border p-2 rounded" id="seek-contact" placeholder="联系方式" data-i18n="seek_contact">
                        <input class="border p-2 rounded" id="seek-city" placeholder="目标城市" data-i18n="seek_city">
                        <input class="border p-2 rounded" id="seek-position" placeholder="期望职位" data-i18n="seek_position">
                        <textarea class="border p-2 rounded" id="seek-summary" rows="3" placeholder="个人简介 / 工作经验" data-i18n="seek_summary"></textarea>
                        <input class="border p-2 rounded" id="seek-salary" placeholder="薪资期望" data-i18n="seek_salary">
                        <label class="flex items-center gap-2 mt-2"><input type="checkbox" id="seek-sync" class="w-4 h-4"> <span data-i18n="seek_sync_label">同步到服务器</span></label>
                    </div>
                    <div class="mt-4 flex justify-end space-x-2">
                        <button id="seek-cancel" class="px-4 py-2 rounded border text-sm" data-i18n="seek_cancel">取消</button>
                        <button id="seek-submit" class="px-4 py-2 rounded bg-blue-600 text-white text-sm" data-i18n="seek_submit">发布</button>
                    </div>
                </div>
            `;
            document.body.appendChild(wrapper);
            applyLang(localStorage.getItem('siteLang') || 'zh');
            document.getElementById('seek-cancel').addEventListener('click', closeSeekModal);
            document.getElementById('seek-submit').addEventListener('click', submitSeek);
        }

        function closeSeekModal(){
            const m = document.getElementById('seek-modal');
            if(m) m.remove();
        }

        async function submitSeek(){
            const name = document.getElementById('seek-name').value.trim();
            const contact = document.getElementById('seek-contact').value.trim();
            const city = document.getElementById('seek-city').value.trim();
            const position = document.getElementById('seek-position').value.trim();
            const summary = document.getElementById('seek-summary').value.trim();
            const salary = document.getElementById('seek-salary').value.trim();
            if(!position){ alert('请输入期望职位'); return; }
            const list = loadSeeks();
            const item = { id: Date.now(), name, contact, city, position, summary, salary, time: Date.now() };
            list.push(item);
            saveSeeks(list);
            // 如果选中同步，则尝试同步到服务器
            const syncChecked = document.getElementById('seek-sync')?.checked;
            if(syncChecked){
                try{
                    const resp = await fetch(SEEKS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(item)
                    });
                    if(resp.ok){
                        alert(translations[localStorage.getItem('siteLang') || 'zh'].sync_success);
                    } else {
                        console.error('sync failed', await resp.text());
                        alert(translations[localStorage.getItem('siteLang') || 'zh'].sync_fail);
                    }
                } catch(err){
                    console.error('sync err', err);
                    alert(translations[localStorage.getItem('siteLang') || 'zh'].sync_fail);
                }
            }
            closeSeekModal();
            renderSeekList();
        }

        function openProfileModal(){
            const user = localStorage.getItem('userEmail');
            if(!user) return;

            if(document.getElementById('profile-modal')) return;
            const wrapper = document.createElement('div');
            wrapper.id = 'profile-modal';
            wrapper.className = 'fixed inset-0 z-60 flex items-center justify-center bg-black/40';
            wrapper.innerHTML = `
                <div class="bg-white rounded-xl w-full max-w-lg p-6">
                    <h3 class="text-lg font-bold mb-4" data-i18n="profile_title">个人资料</h3>
                    <div class="grid gap-3">
                        <div><strong>邮箱：</strong>${escapeHtml(user)}</div>
                        <input class="border p-2 rounded" id="profile-name" placeholder="姓名" data-i18n="profile_name">
                        <input class="border p-2 rounded" id="profile-phone" placeholder="电话" data-i18n="profile_phone">
                        <input class="border p-2 rounded" id="profile-location" placeholder="所在城市" data-i18n="profile_location">
                        <textarea class="border p-2 rounded" id="profile-bio" rows="3" placeholder="个人简介" data-i18n="profile_bio"></textarea>
                        <input class="border p-2 rounded" id="profile-skills" placeholder="技能标签（用逗号分隔）" data-i18n="profile_skills">
                        <textarea class="border p-2 rounded" id="profile-experience" rows="3" placeholder="工作经验" data-i18n="profile_experience"></textarea>
                    </div>
                    <div class="mt-4 flex justify-end space-x-2">
                        <button id="profile-cancel" class="px-4 py-2 rounded border text-sm" data-i18n="cancel">取消</button>
                        <button id="profile-save" class="px-4 py-2 rounded bg-blue-600 text-white text-sm" data-i18n="save">保存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(wrapper);
            applyLang(localStorage.getItem('siteLang') || 'zh');

            // 加载现有资料
            loadProfileData();

            document.getElementById('profile-cancel').addEventListener('click', () => wrapper.remove());
            document.getElementById('profile-save').addEventListener('click', saveProfile);
        }

        function loadProfileData(){
            const user = localStorage.getItem('userEmail');
            if(!user) return;

            // 尝试从服务器获取
            if(PROFILE_API){
                fetch(`${PROFILE_API}?email=${encodeURIComponent(user)}`)
                    .then(resp => resp.ok ? resp.json() : null)
                    .then(data => {
                        if(data && data.user){
                            fillProfileForm(data.user);
                        }
                    })
                    .catch(() => {
                        // 从本地存储获取
                        const localProfile = localStorage.getItem('userProfile_' + user);
                        if(localProfile){
                            fillProfileForm(JSON.parse(localProfile));
                        }
                    });
            } else {
                // 从本地存储获取
                const localProfile = localStorage.getItem('userProfile_' + user);
                if(localProfile){
                    fillProfileForm(JSON.parse(localProfile));
                }
            }
        }

        function fillProfileForm(profile){
            document.getElementById('profile-name').value = profile.name || '';
            document.getElementById('profile-phone').value = profile.phone || '';
            document.getElementById('profile-location').value = profile.location || '';
            document.getElementById('profile-bio').value = profile.bio || '';
            document.getElementById('profile-skills').value = profile.skills || '';
            document.getElementById('profile-experience').value = profile.experience || '';
        }

        async function saveProfile(){
            const user = localStorage.getItem('userEmail');
            if(!user) return;

            const profile = {
                email: user,
                name: document.getElementById('profile-name').value.trim(),
                phone: document.getElementById('profile-phone').value.trim(),
                location: document.getElementById('profile-location').value.trim(),
                bio: document.getElementById('profile-bio').value.trim(),
                skills: document.getElementById('profile-skills').value.trim(),
                experience: document.getElementById('profile-experience').value.trim()
            };

            // 保存到本地
            localStorage.setItem('userProfile_' + user, JSON.stringify(profile));

            // 同步到服务器
            if(PROFILE_API){
                try{
                    const resp = await fetch(PROFILE_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(profile)
                    });
                    if(resp.ok){
                        alert('个人资料已保存并同步到服务器');
                    } else {
                        alert('个人资料已保存到本地，但同步到服务器失败');
                    }
                } catch(err){
                    console.error('profile sync err', err);
                    alert('个人资料已保存到本地，但同步到服务器失败');
                }
            } else {
                alert('个人资料已保存');
            }

            document.getElementById('profile-modal')?.remove();
        }
            document.querySelectorAll('[data-lang]').forEach(img => {
                img.addEventListener('click', () => applyLang(img.dataset.lang));
            });
            const saved = localStorage.getItem('siteLang') || 'zh';
            applyLang(saved);

            // 渲染登录状态（按钮或已登录显示）
            if(typeof renderAuthState === 'function') renderAuthState();

            // 初始化职位相关按钮与列表
            document.getElementById('btn-post-job')?.addEventListener('click', (e) => { e.preventDefault(); openJobModal(); });
            document.getElementById('job-search')?.addEventListener('input', renderJobsList);
            document.getElementById('job-filter')?.addEventListener('change', renderJobsList);
            renderJobsList();
        });
    </script>

</body>
</html>
